<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Cotton Yield Site{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
  </head>
  <body class="app-body">
    <nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom sticky-top">
      <div class="container">
        <a class="navbar-brand fw-bold" href="{{ url_for('home') }}"><i class="bi bi-cloud-sun me-2"></i>Cotton Yield</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav" aria-controls="nav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="nav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link{% if request.path == url_for('home') %} active{% endif %}" href="{{ url_for('home') }}">Home</a></li>
            <li class="nav-item"><a class="nav-link{% if request.path == url_for('predictor') %} active{% endif %}" href="{{ url_for('predictor') }}">Predictor</a></li>
            <li class="nav-item"><a class="nav-link{% if request.path == url_for('about') %} active{% endif %}" href="{{ url_for('about') }}">About</a></li>
            <li class="nav-item"><a class="nav-link{% if request.path == url_for('contact') %} active{% endif %}" href="{{ url_for('contact') }}">Contact</a></li>
          </ul>
        </div>
      </div>
    </nav>
    <main class="container py-4">{% block content %}{% endblock %}</main>
    <footer class="text-center text-muted small py-4 border-top">© 2025 Cotton Yield Predictor • Built with Flask & LightGBM</footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>const io=new IntersectionObserver((entries)=>{entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('reveal-in');io.unobserve(e.target);}});},{threshold:0.1});document.querySelectorAll('.reveal').forEach(el=>io.observe(el));</script>
    {% block scripts %}{% endblock %}
  </body>
</html>
